name: gosec

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # 2.27.1
      with:
        args: ./...
    timeout-minutes: 5
